name: Release

# Create a release from a tag, e.g. git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - name: Linux build dependencies (AppImage)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # One OS per job: only that runner’s artifacts exist. Unmatched globs are ignored.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            electron/out/*.exe
            electron/out/*.dmg
            electron/out/*.AppImage
            electron/out/*.blockmap
            electron/out/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
