<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notato</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
        transition: background 0.2s ease;
      }

      .notato-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      .draw-item.is-selected {
        filter: drop-shadow(0 0 2px rgba(0, 122, 255, 0.9));
      }

      /* Full-screen shell stays pointer-events: none so clicks reach the SVG.
         .selection-transform-bar and .notato-resize-handle use pointer-events: auto. */
      .selection-overlay {
        position: fixed;
        inset: 0;
        z-index: 90;
        pointer-events: none;
      }

      #selection-overlay.hidden {
        display: none;
      }

      .selection-marquee {
        position: absolute;
        border: 2px dashed rgba(0, 122, 255, 0.95);
        border-radius: 2px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .toolbar-btn .toolbar-icon {
        display: block;
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }

      .toolbar-icon--fa {
        width: 20px;
        height: 20px;
      }

      .toolbar-drag .toolbar-icon {
        width: 18px;
        height: 18px;
      }

      .notato-resize-handle {
        position: absolute;
        width: 14px;
        height: 14px;
        margin: -7px 0 0 -7px;
        background: #fff;
        border: 2px solid #007aff;
        border-radius: 2px;
        cursor: nwse-resize;
        padding: 0;
        pointer-events: auto;
      }

      .selection-transform-bar {
        position: absolute;
        transform: translateX(-50%);
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 4px;
        pointer-events: auto;
        padding: 5px 8px;
        background: rgba(28, 28, 30, 0.96);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      }

      .notato-action-btn {
        width: 30px;
        height: 30px;
        margin: 0;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: #ddd;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .notato-action-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }

      .notato-action-btn.is-active {
        background: rgba(0, 122, 255, 0.22);
        border-color: rgba(0, 122, 255, 0.65);
        color: #fff;
      }

      .notato-action-btn .action-icon {
        display: block;
        flex-shrink: 0;
      }

      .notato-rotate-handle {
        cursor: grab;
      }

      .notato-rotate-handle:active {
        cursor: grabbing;
      }

      #toolbar {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        align-items: center;
        background: rgba(30, 30, 30, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 12px;
        padding: 8px 16px;
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      .toolbar-drag {
        flex-shrink: 0;
        width: 18px;
        height: 28px;
        margin: -4px 2px -4px -4px;
        padding: 0;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: rgba(255, 255, 255, 0.35);
        cursor: grab;
        font-size: 14px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toolbar-drag:hover {
        color: rgba(255, 255, 255, 0.55);
        background: rgba(255, 255, 255, 0.06);
      }

      .toolbar-drag:active {
        cursor: grabbing;
      }

      #toolbar.hidden {
        display: none;
      }

      .toolbar-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: #ccc;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
      }

      .toolbar-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      .toolbar-btn.active {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
      }

      .color-swatch {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .color-swatch:hover {
        transform: scale(1.15);
      }

      .color-swatch.active {
        border-color: #fff;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
      }

      .separator {
        width: 1px;
        height: 24px;
        background: rgba(255, 255, 255, 0.15);
        margin: 0 4px;
      }

      #size-slider {
        width: 80px;
        accent-color: #888;
      }

      #size-display {
        color: #999;
        font-size: 12px;
        font-family: monospace;
        min-width: 28px;
        text-align: center;
      }

      #status {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: rgba(30, 30, 30, 0.85);
        color: #999;
        font-family: system-ui, sans-serif;
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 8px;
        z-index: 100;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #canvas-panel {
        position: fixed;
        top: 80px;
        left: 16px;
        width: 220px;
        max-height: calc(100vh - 120px);
        background: rgba(30, 30, 30, 0.92);
        backdrop-filter: blur(12px);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        z-index: 100;
        display: flex;
        flex-direction: column;
        user-select: none;
        -webkit-user-select: none;
        overflow: hidden;
        transition: opacity 0.15s ease;
        touch-action: none;
      }

      #canvas-panel.hidden {
        display: none;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        cursor: grab;
        flex-shrink: 0;
      }

      .panel-header:active {
        cursor: grabbing;
      }

      .panel-title {
        color: #aaa;
        font-family: system-ui, sans-serif;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .panel-actions {
        display: flex;
        gap: 2px;
      }

      .panel-btn {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: #999;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
      }

      .panel-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      #canvas-list {
        overflow-y: auto;
        flex: 1;
        padding: 4px;
      }

      #canvas-list::-webkit-scrollbar {
        width: 4px;
      }

      #canvas-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 2px;
      }

      .canvas-empty {
        color: #555;
        font-family: system-ui, sans-serif;
        font-size: 12px;
        text-align: center;
        padding: 24px 12px;
        line-height: 1.6;
      }

      .canvas-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 8px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s ease;
      }

      .canvas-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .canvas-item.active {
        background: rgba(255, 255, 255, 0.1);
      }

      .canvas-name {
        color: #bbb;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .canvas-item.active .canvas-name {
        color: #fff;
      }

      .canvas-rename-input {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        padding: 1px 6px;
        flex: 1;
        outline: none;
        min-width: 0;
      }

      .canvas-delete {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: none;
        background: transparent;
        color: #666;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: all 0.12s ease;
        flex-shrink: 0;
      }

      .canvas-item:hover .canvas-delete {
        opacity: 1;
      }

      .canvas-delete:hover {
        background: rgba(255, 59, 48, 0.2);
        color: #ff3b30;
      }

      .canvas-delete svg {
        display: block;
        width: 14px;
        height: 14px;
      }

      .panel-btn .toolbar-icon {
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button
          type="button"
          class="toolbar-drag"
          id="toolbar-drag"
          aria-label="Drag toolbar"
          title="Drag to move toolbar"
        >
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2s.9-2 2-2s2 .9 2 2m-2-8c-1.1 0-2 .9-2 2s.9 2 2 2s2-.9 2-2s-.9-2-2-2m0-6c-1.1 0-2 .9-2 2s.9 2 2 2s2-.9 2-2s-.9-2-2-2m6 4c1.1 0 2-.9 2-2s-.9-2-2-2s-2 .9-2 2s.9 2 2 2m0 2c-1.1 0-2 .9-2 2s.9 2 2 2s2-.9 2-2s-.9-2-2-2m0 6c-1.1 0-2 .9-2 2s.9 2 2 2s2-.9 2-2s-.9-2-2-2"
            />
          </svg>
        </button>
        <button
          class="toolbar-btn active"
          data-tool="pen"
          id="btn-pen"
          title="Pen (P)"
        >
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75zM20.71 7.04a.996.996 0 0 0 0-1.41l-2.34-2.34a.996.996 0 0 0-1.41 0l-1.83 1.83l3.75 3.75z"
            />
          </svg>
        </button>
        <button class="toolbar-btn" data-tool="line" id="btn-line" title="Line (L)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="m3.5 18.49l6-6.01l4 4L22 6.92l-1.41-1.41l-7.09 7.97l-4-4L2 16.99z"
            />
          </svg>
        </button>
        <button
          class="toolbar-btn"
          data-tool="arrow"
          id="btn-arrow"
          title="Arrow (Shift+L)"
        >
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M9 5v2h6.59L4 18.59L5.41 20L17 8.41V15h2V5z"
            />
          </svg>
        </button>
        <button class="toolbar-btn" data-tool="rect" id="btn-rect" title="Rectangle (R)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M18 4H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m0 14H6V6h12z"
            />
          </svg>
        </button>
        <button
          class="toolbar-btn"
          data-tool="rectFilled"
          id="btn-rect-filled"
          title="Filled Rectangle (Shift+R)"
        >
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M3 3h18v18H3z" />
          </svg>
        </button>
        <button class="toolbar-btn" data-tool="circle" id="btn-circle" title="Circle (O)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2m0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8s8 3.58 8 8s-3.58 8-8 8"
            />
          </svg>
        </button>
        <button
          class="toolbar-btn"
          data-tool="circleFilled"
          id="btn-circle-filled"
          title="Filled Circle (Shift+O)"
        >
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10s10-4.47 10-10S17.53 2 12 2"
            />
          </svg>
        </button>
        <button class="toolbar-btn" data-tool="eraser" id="btn-eraser" title="Eraser (E)">
          <svg
            class="toolbar-icon toolbar-icon--fa"
            viewBox="0 0 576 512"
            aria-hidden="true"
            focusable="false"
          >
            <path
              fill="currentColor"
              d="M290.7 57.4L57.4 290.7c-25 25-25 65.5 0 90.5l80 80c12 12 28.3 18.7 45.3 18.7l105.3.1h224c17.7 0 32-14.3 32-32s-14.3-32-32-32H387.9l130.7-130.7c25-25 25-65.5 0-90.5L381.3 57.4c-25-25-65.5-25-90.5 0zm6.7 358.6H182.6l-80-80l124.7-124.7l137.4 137.4z"
            />
          </svg>
        </button>
        <button class="toolbar-btn" data-tool="select" id="btn-select" title="Select / move / resize / rotate (V)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M10 9h4V6h3l-5-5l-5 5h3zm-1 1H6V7l-5 5l5 5v-3h3zm14 2l-5-5v3h-3v4h3v3zm-9 3h-4v3H7l5 5l5-5h-3z"
            />
          </svg>
        </button>

        <div class="separator"></div>

        <div
          class="color-swatch active"
          data-color="#FF3B30"
          style="background: #ff3b30"
          title="Red"
        ></div>
        <div
          class="color-swatch"
          data-color="#FF9500"
          style="background: #ff9500"
          title="Orange"
        ></div>
        <div
          class="color-swatch"
          data-color="#FFCC02"
          style="background: #ffcc02"
          title="Yellow"
        ></div>
        <div
          class="color-swatch"
          data-color="#34C759"
          style="background: #34c759"
          title="Green"
        ></div>
        <div
          class="color-swatch"
          data-color="#007AFF"
          style="background: #007aff"
          title="Blue"
        ></div>
        <div
          class="color-swatch"
          data-color="#FFFFFF"
          style="background: #ffffff"
          title="White"
        ></div>

        <div class="separator"></div>

        <input type="range" id="size-slider" min="1" max="20" value="10" />
        <span id="size-display">10</span>

        <div class="separator"></div>

        <button class="toolbar-btn" id="btn-undo" title="Undo (Ctrl+Z)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88c3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8"
            />
          </svg>
        </button>
        <button class="toolbar-btn" id="btn-redo" title="Redo (Ctrl+Y or Ctrl+Shift+Z)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <g transform="translate(24 0) scale(-1 1)">
              <path
                fill="currentColor"
                d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88c3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8"
              />
            </g>
          </svg>
        </button>
        <button class="toolbar-btn" id="btn-clear" title="Clear All (C)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6zM19 4h-3.5l-1-1h-5l-1 1H5v2h14z"
            />
          </svg>
        </button>

        <div class="separator"></div>

        <button class="toolbar-btn" id="btn-save" title="Save (Ctrl+S)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V7zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3s3 1.34 3 3s-1.34 3-3 3m3-10H5V5h10z"
            />
          </svg>
        </button>
        <button class="toolbar-btn" id="btn-panel" title="Canvases (Tab)">
          <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8z"
            />
          </svg>
        </button>
      </div>

      <div id="canvas-panel">
        <div class="panel-header">
          <span class="panel-title">Canvases</span>
          <div class="panel-actions">
            <button class="panel-btn" id="btn-new-canvas" title="New blank canvas">
              <svg class="toolbar-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z" />
              </svg>
            </button>
          </div>
        </div>
        <div id="canvas-list"></div>
      </div>

      <div id="status">
        Press <b>Ctrl+Shift+A</b> to toggle drawing | <b>Ctrl+Shift+D</b> to hide
      </div>

      <div id="selection-overlay" class="selection-overlay hidden" aria-hidden="true">
        <div class="selection-marquee" id="selection-marquee"></div>
        <button
          type="button"
          class="notato-resize-handle"
          id="resize-handle-br"
          aria-label="Resize selection"
        ></button>
        <div id="selection-transform-bar" class="selection-transform-bar" role="toolbar" aria-label="Transform selection">
          <button type="button" class="notato-action-btn" id="flip-h-btn" title="Flip horizontal">
            <svg class="action-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path
                fill="currentColor"
                d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99zM21 9l-3.99-4v3H10v2h7.01v3z"
              />
            </svg>
          </button>
          <button
            type="button"
            class="notato-action-btn notato-rotate-handle"
            id="rotate-handle"
            title="Drag to rotate · Right-click to reset"
          >
            <svg class="action-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path
                fill="currentColor"
                d="M15.55 5.55L11 1v3.07C7.06 4.56 4 7.92 4 12s3.05 7.44 7 7.93v-2.02c-2.84-.48-5-2.94-5-5.91s2.16-5.43 5-5.91V10zM19.93 11a7.9 7.9 0 0 0-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47zM13 17.9v2.02c1.39-.17 2.74-.71 3.9-1.61l-1.44-1.44c-.75.54-1.59.89-2.46 1.03m3.89-2.42l1.42 1.41c.9-1.16 1.45-2.5 1.62-3.89h-2.02c-.14.87-.48 1.72-1.02 2.48"
              />
            </svg>
          </button>
          <button type="button" class="notato-action-btn" id="flip-v-btn" title="Flip vertical">
            <svg class="action-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path
                fill="currentColor"
                d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99zM9 3L5 6.99h3V14h2V6.99h3z"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./renderer/app.js"></script>
  </body>
</html>
